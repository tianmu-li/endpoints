name: "agentic-coding-benchmark"
version: "1.0"
type: "online"

model_params:
  name: "/model" # SGLang registers the model under its --model-path
  # Moonshot's recommended Thinking-mode sampling for Kimi-K2.6
  # (https://huggingface.co/moonshotai/Kimi-K2.6). preserve_thinking is a
  # no-op for tool-calling trajectories (the chat template already keeps
  # reasoning when every prior assistant has tool_calls), but kept on for
  # symmetry with the model card and to mirror the workflow yaml.
  temperature: 1.0
  top_p: 0.95
  max_new_tokens: 20000 # covers longest observed assistant turn (~18k tokens)
  chat_template_kwargs:
    thinking: true
    preserve_thinking: true

datasets:
  - name: agentic_coding
    type: performance
    path: examples/09_MultiTurn/datasets/agentic_coding_t1.jsonl
    multi_turn:
      turn_timeout_s: 600.0
      enable_salt: true # cache-bursting salt — see docs/EVALUATION.md §2

settings:
  runtime:
    min_duration_ms: 0
    max_duration_ms: 3600000

  load_pattern:
    type: multi_turn
    target_concurrency: 4

  # Mandatory: with the default warmup behaviour, every request fails with
  # ConnectionResetError because uvicorn closes pre-warmed idle sockets after 5s.
  client:
    warmup_connections: 0
    max_idle_time: 0.5

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_type: openai

report_dir: logs/agentic_coding
