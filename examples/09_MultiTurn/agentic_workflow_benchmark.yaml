name: "agentic-workflow-benchmark"
version: "1.0"
type: "online"

model_params:
  name: "Qwen/Qwen3.6-35B-A3B" # Replace with your actual model name
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5
  repetition_penalty: 1.0
  max_new_tokens: 1024

datasets:
  - name: agentic_workflow
    type: performance
    # Run: python scripts/convert_agentic_snapshot.py <input.jsonl> examples/09_MultiTurn/datasets/agentic_workflow_flat.jsonl --verify
    # The datasets/ directory is a placeholder; populate it with the conversion script above.
    path: /home/tianmuli/vllm_test/datasets/agentic_workflow_v2.jsonl
    multi_turn:
      turn_timeout_s: 3000.0

settings:
  runtime:
    min_duration_ms: 0
    max_duration_ms: 27000000

  load_pattern:
    type: multi_turn
    target_concurrency: 48

endpoint_config:
  endpoints:
    - "http://localhost:30000"
  api_type: openai

report_dir: logs/agentic_workflow_sampling_1024

# Enable output collection for this performance run
# Outputs will be stored in {report_dir}/events/ and {report_dir}/events.db
collect_outputs: true
