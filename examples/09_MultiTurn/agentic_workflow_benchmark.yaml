name: "agentic-workflow-benchmark"
version: "1.0"
type: "online"

model_params:
  name: "/model"            # SGLang registers the model under its --model-path
  temperature: 0            # MLPerf-inference convention: greedy decoding for reproducibility.
                            # MLPerf references (Llama 3.1, Mixtral, DeepSeek-R1, GPT-OSS-120B)
                            # all override to greedy so the benchmark stays reproducible.
  max_new_tokens: 20000     # generous cap; longest observed workflow turn is ~840 tokens

datasets:
  - name: agentic_workflow
    type: performance
    path: examples/09_MultiTurn/datasets/agentic_workflow_flat.jsonl
    multi_turn:
      turn_timeout_s: 600.0

settings:
  runtime:
    min_duration_ms: 0
    max_duration_ms: 3600000

  load_pattern:
    type: multi_turn
    target_concurrency: 16

  # Mandatory: with the default warmup behaviour, every request fails with
  # ConnectionResetError because uvicorn closes pre-warmed idle sockets after 5s.
  client:
    warmup_connections: 0
    max_idle_time: 0.5

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_type: openai

report_dir: logs/agentic_workflow
