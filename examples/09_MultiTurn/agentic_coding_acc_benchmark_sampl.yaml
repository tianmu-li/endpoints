name: "agentic-coding-benchmark"
version: "1.0"
type: "online"

model_params:
  name: "Qwen/Qwen3.6-35B-A3B" # Replace with your actual model name
  temperature: 1.0
  top_k: 20
  top_p: 0.95
  repetition_penalty: 1.0
  presence_penalty: 1.5
  max_new_tokens: 32768

datasets:
  - name: agentic_coding
    type: performance
    # Run: python scripts/convert_agentic_snapshot.py <input.jsonl> examples/09_MultiTurn/datasets/agentic_coding_flat.jsonl --verify
    # The datasets/ directory is a placeholder; populate it with the conversion script above.
    path: /home/tianmuli/vllm_test/datasets/agentic_coding_v2_subset_10.jsonl
    multi_turn:
      turn_timeout_s: 600.0
  - name: "aime25::gptoss"
    type: "accuracy"
    accuracy_config:
      eval_method: "pass_at_1"
      ground_truth: "answer"
      extractor: "boxed_math_extractor"
      num_repeats: 8
  - name: "gpqa::gptoss"
    type: "accuracy"
    accuracy_config:
      eval_method: "pass_at_1"
      extractor: "abcd_extractor"
      ground_truth: "ground_truth"
      num_repeats: 5

settings:
  runtime:
    min_duration_ms: 0
    max_duration_ms: 3600000

  load_pattern:
    type: multi_turn
    target_concurrency: 128

endpoint_config:
  endpoints:
    - "http://localhost:30000"
  api_type: openai

# Enable output collection for this performance run
# Outputs will be stored in {report_dir}/events/ and {report_dir}/events.db
collect_outputs: true

report_dir: logs/agentic_coding_acc_long
