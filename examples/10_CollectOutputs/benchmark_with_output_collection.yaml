# Example: Performance benchmark with output collection enabled
#
# This config demonstrates how to enable output logging for performance runs
# using the collect_outputs flag. Outputs (model responses) are collected and
# logged to the events database/JSONL, allowing for offline analysis without
# switching to accuracy mode.

type: offline
name: offline_benchmark_with_outputs

model_params:
  name: meta-llama/Llama-2-7b-hf
  streaming: off

datasets:
  - name: performance_dataset
    path: data.jsonl
    type: performance

settings:
  max_duration_ms: 60000
  load_pattern:
    type: max_throughput

endpoint_config:
  endpoints:
    - http://localhost:8000
  api_type: openai

# Enable output collection for this performance run
# Outputs will be stored in {report_dir}/events/ and {report_dir}/events.db
collect_outputs: true
